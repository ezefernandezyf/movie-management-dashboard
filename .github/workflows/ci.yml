name: CI

on:
  push:
    branches:
      - main
      - feature/release-setup-ci-vercel
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests (CI config)
        run: npx vitest --config vitest.ci.config.js --run
        env:
          CI: true

      - name: Build
        run: npm run build
