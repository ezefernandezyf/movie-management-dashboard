name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Format check · Test · Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format:check)
        run: npm run format:check

      - name: ESLint (lint)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test -- --run

      - name: Build (Vite)
        run: npm run build
